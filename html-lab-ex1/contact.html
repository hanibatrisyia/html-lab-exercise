<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="description" content="Contact Information">
	<title>Contact Me</title>
</head>
<body>
	<h1>Contact Me</h1>
	<form action="#" method="post">
		<fieldset style="padding: 20px; border: 2px solid navy; background-color: aquamarine">
			<legend style="font-size: 18px; color: navy;">Your Information</legend>

			<label for="name">Name:</label>
			<input type="text" id="name" name="name" placeholder="Name" required maxlength="100"><br><br>

			<label for="email">Email:</label>
			<input type="email" id="email" name="email" placeholder="example@email.com" required><br><br>

			<label for="phone">Phone Number:</label>
			<input type="tel" id="phone" name="phone" placeholder="0123456789"><br><br>

			<label for="age">Age:</label>
			<input type="number" id="age" name="age"><br><br>

			<label for="dob">Date of Birth:</label>
			<input type="date" id="dob" name="dob"><br><br>

			<label for="rate">Rate My Page (1-5):</label>
			<input type="range" id="rate" name="rate" min="0" max="5"><br><br>

			<label for="feedback">Feedback:</label>
			<input type="textarea" id="feedback" name="feedback"><br><br>
		</fieldset>
	</form>
</body>
</html>
